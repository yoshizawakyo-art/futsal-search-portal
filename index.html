<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pocket Notebook - TODO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css" />
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">
                    <span class="logo-main">Pocket</span>
                    <span class="logo-sub">Notebook.</span>
                </h1>
                <span class="logo-tag">&mdash; TODO &mdash;</span>
            </div>

            <nav class="sidebar-nav">
                <button type="button" class="nav-item nav-item--active" data-view="today">
                    <span class="nav-icon">&#9788;</span>
                    <span class="nav-label">今日</span>
                    <span class="nav-hint">Today</span>
                </button>
                <button type="button" class="nav-item" data-view="all">
                    <span class="nav-icon">&equiv;</span>
                    <span class="nav-label">全タスク</span>
                    <span class="nav-hint">All</span>
                </button>
                <button type="button" class="nav-item" data-view="completed">
                    <span class="nav-icon">&check;</span>
                    <span class="nav-label">完了済み</span>
                    <span class="nav-hint">Done</span>
                </button>
                <button type="button" class="nav-item" data-view="now">
                    <span class="nav-icon">&#9728;</span>
                    <span class="nav-label">今これ</span>
                    <span class="nav-hint">Now</span>
                </button>
                <button type="button" class="nav-item" data-view="journal">
                    <span class="nav-icon">&#9733;</span>
                    <span class="nav-label">達成</span>
                    <span class="nav-hint">Journal</span>
                </button>
            </nav>

            <div class="sidebar-progress">
                <p class="progress-label">this week</p>
                <p class="progress-count"><span id="completed-count">0</span> / <span id="total-count">0</span> 完了</p>
                <div class="progress-bar">
                    <div class="progress-bar-fill" id="progress-fill"></div>
                </div>
                <p class="progress-message" id="progress-message">keep going!</p>
            </div>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <div class="header-date">
                    <p class="date-weekday" id="weekday-text">MONDAY</p>
                    <p class="date-full">
                        <span class="date-month" id="month-text">4月</span>
                        <span class="date-day" id="day-text">26</span>
                        <span class="date-day-suffix">日</span>
                        <span class="date-year" id="year-text">'26</span>
                    </p>
                    <p class="date-subtitle" id="today-subtitle">きょうの予定 &mdash; <span id="today-done">0</span> of <span id="today-total">0</span> done</p>
                </div>
            </header>

            <div class="notebook-page">
                <div class="notebook-margin"></div>
                <div class="notebook-content">
                    <section class="task-filter-section">
                        <div class="filter-row">
                            <div class="search-box">
                                <span class="search-icon">&#128269;</span>
                                <input id="search-input" type="search" placeholder="キーワードで探す..." />
                            </div>
                            <div class="filter-chips">
                                <button type="button" class="filter-chip" data-status="all">すべて</button>
                                <button type="button" class="filter-chip filter-chip--active" data-status="active">未完了</button>
                                <button type="button" class="filter-chip" data-status="completed">完了</button>
                            </div>
                        </div>
                    </section>

                    <section class="task-form-section" aria-labelledby="form-heading">
                        <h2 id="form-heading" class="sr-only">タスク入力</h2>
                        <form id="task-form" class="task-form" autocomplete="off" novalidate>
                            <div class="form-main-row">
                                <span class="form-icon">+</span>
                                <input id="title-input" name="title" type="text" maxlength="200" placeholder="例: 明日 牛乳買う #買い物 !!" required />
                            </div>
                            <div id="input-preview" class="input-preview" hidden></div>
                            <div class="form-details" id="form-details">
                                <div class="form-row">
                                    <label for="due-input">期限</label>
                                    <div class="due-chips">
                                        <button type="button" class="due-chip" data-due="today">今日</button>
                                        <button type="button" class="due-chip" data-due="tomorrow">明日</button>
                                        <input id="due-input" name="dueDate" type="date" />
                                    </div>
                                </div>
                                <div class="form-row">
                                    <label>優先度</label>
                                    <div class="priority-stars">
                                        <button type="button" class="star-btn" data-priority="low" title="低">&#9734;&#9734;&#9734;</button>
                                        <button type="button" class="star-btn star-btn--active" data-priority="medium" title="中">&#9733;&#9734;&#9734;</button>
                                        <button type="button" class="star-btn" data-priority="high" title="高">&#9733;&#9733;&#9733;</button>
                                    </div>
                                    <input type="hidden" id="priority-select" name="priority" value="medium" />
                                </div>
                                <div class="form-row">
                                    <label for="tags-input">タグ</label>
                                    <input id="tags-input" name="tags" type="text" placeholder="カンマ区切り 例: 仕事, 急ぎ" />
                                </div>
                                <div class="form-actions">
                                    <button type="button" id="cancel-edit" class="btn-cancel" hidden>キャンセル</button>
                                    <button type="submit" class="btn-submit">手帳に書き込む</button>
                                </div>
                            </div>
                            <p id="form-error" class="form-error" role="alert"></p>
                        </form>
                    </section>

                    <section class="task-list-section" id="task-list-section" aria-labelledby="list-heading">
                        <h2 id="list-heading" class="sr-only">タスク一覧</h2>
                        <ul id="task-list" class="task-list"></ul>
                    </section>

                    <section class="now-mode-section" id="now-mode-section" aria-labelledby="now-heading" hidden>
                        <h2 id="now-heading" class="sr-only">今これ</h2>
                        <div id="now-mode-container"></div>
                    </section>

                    <section class="journal-section" id="journal-section" aria-labelledby="journal-heading" hidden>
                        <h2 id="journal-heading" class="sr-only">達成ジャーナル</h2>
                        <div id="journal-container"></div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { init } from "./src/main.js";
        init();
    </script>
</body>
</html>
